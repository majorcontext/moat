# Example: Network firewall with HTTP request rules
#
# This example demonstrates fine-grained HTTP request rules.
# Rules use first-match-wins evaluation with method + path patterns.
#
# Run with:
#   moat run examples/firewall
#
# What this config does:
#   - httpbin.org: GET requests allowed, everything else denied
#   - api.github.com: read-only access (GET), but /admin/* is blocked
#   - example.com: not listed, blocked by strict policy
#
# Path patterns:
#   *  — matches a single path segment
#   ** — matches zero or more path segments

name: firewall-demo

dependencies:
  - python@3.11

network:
  policy: strict
  rules:
    # httpbin.org: allow GET only (deny all other methods)
    - "httpbin.org":
        - "allow GET /**"
        - "deny * /**"

    # api.github.com: block admin paths, allow GET, deny the rest
    - "api.github.com":
        - "deny * /admin/**"
        - "allow GET /repos/*"
        - "allow GET /repos/*/pulls"
        - "deny * /**"

command: ["python3", "/workspace/demo.py"]
